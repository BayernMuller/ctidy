name: Release cformat

on:
  push:
    tags:
      - "cformat-v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_wheels:
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: cformat-wheel-linux-x86_64
            runs_on: ubuntu-latest
            cibw_archs: x86_64
            macos_deployment_target: ""
          - artifact_name: cformat-wheel-macos-x86_64
            runs_on: macos-15-intel
            cibw_archs: x86_64
            macos_deployment_target: "10.15"
          - artifact_name: cformat-wheel-macos-arm64
            runs_on: macos-14
            cibw_archs: arm64
            macos_deployment_target: "11.0"
          - artifact_name: cformat-wheel-windows-amd64
            runs_on: windows-latest
            cibw_archs: AMD64
            macos_deployment_target: ""
    uses: ./.github/workflows/_wheel-build.yml
    with:
      package_name: cformat
      package_dir: packages/cformat
      artifact_name: ${{ matrix.artifact_name }}
      runs_on: ${{ matrix.runs_on }}
      cibw_archs: ${{ matrix.cibw_archs }}
      macos_deployment_target: ${{ matrix.macos_deployment_target }}
    secrets: inherit

  publish:
    runs-on: ubuntu-latest
    needs:
      - build_wheels
    permissions:
      id-token: write
    environment: pypi-cformat
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "cformat-wheel-*"
          merge-multiple: true
          path: dist
      - run: ls -lh dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
