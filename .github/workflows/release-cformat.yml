name: Release cformat

on:
  push:
    tags:
      - "cformat-v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_wheels:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.runs_on }}
    permissions:
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: cformat-wheel-linux-x86_64
            runs_on: ubuntu-latest
            cibw_archs: x86_64
            macos_deployment_target: ""
          - artifact_name: cformat-wheel-macos-x86_64
            runs_on: macos-15-intel
            cibw_archs: x86_64
            macos_deployment_target: "10.15"
          - artifact_name: cformat-wheel-macos-arm64
            runs_on: macos-14
            cibw_archs: arm64
            macos_deployment_target: "11.0"
          - artifact_name: cformat-wheel-windows-amd64
            runs_on: windows-latest
            cibw_archs: AMD64
            macos_deployment_target: ""
    env:
      CIBW_BUILD: "cp39-*"
      CPPLLVM_DOWNLOAD_DIR: ${{ github.workspace }}/.cache/cformat-downloads
      CIBW_ARCHS: ${{ matrix.cibw_archs }}
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_deployment_target }}
      CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w {dest_dir} {wheel}"
      CIBW_REPAIR_WHEEL_COMMAND_MACOS: ""
      CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/cache@v4
        with:
          path: .cache/cformat-downloads
          key: cformat-downloads-${{ matrix.artifact_name }}-${{ github.sha }}
          restore-keys: |
            cformat-downloads-${{ matrix.artifact_name }}-
      - run: python -m pip install --upgrade cibuildwheel
      - run: python -m cibuildwheel --output-dir "${{ github.workspace }}/wheelhouse"
        working-directory: packages/cformat
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: wheelhouse/*.whl

  publish:
    runs-on: ubuntu-latest
    needs:
      - build_wheels
    permissions:
      id-token: write
    environment: pypi-cformat
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "cformat-wheel-*"
          merge-multiple: true
          path: dist
      - run: ls -lh dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          attestations: false
          verbose: true
