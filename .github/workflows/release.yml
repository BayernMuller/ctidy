name: Release PyPI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  linux_x86_64:
    uses: ./.github/workflows/_wheel-build.yml
    with:
      artifact_name: wheel-linux-x86_64
      runs_on: ubuntu-latest
      cibw_archs: x86_64
      publish: false
    secrets: inherit

  macos_x86_64:
    uses: ./.github/workflows/_wheel-build.yml
    with:
      artifact_name: wheel-macos-x86_64
      runs_on: macos-13
      cibw_archs: x86_64
      macos_deployment_target: "10.15"
      publish: false
    secrets: inherit

  macos_arm64:
    uses: ./.github/workflows/_wheel-build.yml
    with:
      artifact_name: wheel-macos-arm64
      runs_on: macos-14
      cibw_archs: arm64
      macos_deployment_target: "11.0"
      publish: false
    secrets: inherit

  windows_amd64:
    uses: ./.github/workflows/_wheel-build.yml
    with:
      artifact_name: wheel-windows-amd64
      runs_on: windows-latest
      cibw_archs: AMD64
      publish: false
    secrets: inherit

  publish:
    runs-on: ubuntu-latest
    needs:
      - build_sdist
      - linux_x86_64
      - macos_x86_64
      - macos_arm64
      - windows_amd64
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true
          path: dist
      - run: ls -lh dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
