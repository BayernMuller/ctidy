name: Wheel Linux x86_64

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  linux_x86_64:
    uses: ./.github/workflows/_wheel-build.yml
    with:
      artifact_name: wheel-linux-x86_64
      runs_on: ubuntu-latest
      cibw_archs: x86_64
      publish: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    secrets: inherit

