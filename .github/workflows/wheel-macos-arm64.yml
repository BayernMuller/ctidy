name: Wheel macOS arm64

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  macos_arm64:
    uses: ./.github/workflows/_wheel-build.yml
    with:
      artifact_name: wheel-macos-arm64
      runs_on: macos-14
      cibw_archs: arm64
      macos_deployment_target: "11.0"
      publish: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    secrets: inherit

