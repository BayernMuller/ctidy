[build-system]
requires = [
  "setuptools>=70.1",
  "wheel>=0.43",
  "tomli>=1.2; python_version < '3.11'",
]
build-backend = "setuptools.build_meta"

[project]
name = "cformat"
version = "20.1.0"
description = "Bundled prebuilt clang-format wheels with a cformat entrypoint."
readme = "README.md"
requires-python = ">=3.9"
license = "Apache-2.0 WITH LLVM-exception"
authors = [{ name = "cformat" }]
urls = { Homepage = "https://github.com/BayernMuller/cppllvm", Repository = "https://github.com/BayernMuller/cppllvm", Issues = "https://github.com/BayernMuller/cppllvm/issues" }
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Intended Audience :: Developers",
  "Operating System :: MacOS",
  "Operating System :: Microsoft :: Windows",
  "Operating System :: POSIX :: Linux",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Build Tools",
]
scripts = { cformat = "cformat.cli:main" }

[tool.setuptools]
package-dir = { "" = "src" }
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]

[tool.cformat]
prebuilt_release_tag = "master-796e77c"

[tool.cibuildwheel]
build-verbosity = 1
repair-wheel-command = ""
test-command = "python -c \"import importlib.resources as resources, os, subprocess; from cformat import __version__; data = resources.files('cformat').joinpath('data'); binary = 'clang-format.exe' if os.name == 'nt' else 'clang-format'; assert data.joinpath('bin', binary).is_file(); subprocess.check_call(['cformat', '--help']); subprocess.check_call(['cformat', '--version'])\""
